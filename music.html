<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css" type="text/css">
    <link rel="icon" href="youtube-music-favicon-32.png" type="image/png" sizes="32x32">
    <link rel="icon" href="youtube-music-logo.png" type="image/png" sizes="144x144">
    <title>My Music</title>
</head>
<body>
    <header class="site-header">
        <h1 class="brand">
            <a href="index.html" class="brand-link">
                <img src="youtube-logo.png" alt="Youtube" width="30" height="30">
                Youtube
            </a>
            <a href="music.html" class="brand-link">
                <img src="youtube-music-logo.png" alt="Youtube Music" width="30" height="30">
                 Music
            </a>
        </h1>

        <div class="header-actions">
            <button
                id="theme-button"
                class="theme-toggle"
                type="button"
                role="switch"
                aria-checked="false"
                aria-label="Toggle light and dark mode"
            >
                <span class="theme-toggle-track" aria-hidden="true">
                    <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <circle cx="12" cy="12" r="4"></circle>
                        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
                    </svg>
                    <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M21 14.5A8.5 8.5 0 0 1 9.5 3 7 7 0 1 0 21 14.5z"></path>
                    </svg>
                    <span class="theme-toggle-thumb"></span>
                </span>
            </button>

            <div class="account">
                <button
                    id="account-toggle"
                    class="account-toggle"
                    type="button"
                    aria-expanded="false"
                    aria-controls="account-panel"
                    aria-label="Open account menu"
                >
                    <span id="account-initial" class="account-initial">G</span>
                </button>

                <section
                    id="account-panel"
                    class="account-panel"
                    aria-label="Account"
                    hidden
                >
                    <div class="account-summary">
                        <p id="account-display-name" class="account-display-name">Guest</p>
                        <p id="account-display-email" class="account-display-email">No email saved</p>
                    </div>

                    <form id="account-form" class="account-form">
                        <label>
                            Name
                            <input
                                type="text"
                                id="account-name"
                                name="name"
                                autocomplete="name"
                                required
                            >
                        </label>
                        <label>
                            Email
                            <input
                                type="email"
                                id="account-email"
                                name="email"
                                autocomplete="email"
                                required
                            >
                        </label>
                        <button type="submit">Save account</button>
                    </form>
                    <p id="account-status" class="account-status" hidden>Saved locally.</p>
                </section>
            </div>
        </div>
    </header>

    <h2>This is my selection of music videos</h2>


    <div class="video-container">
        <iframe
            width="1136"
            height="639"
            src="https://www.youtube.com/embed/60ItHLz5WEA?enablejsapi=1"
            title="Alan Walker - Faded"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen
            class="video"
        ></iframe>
        <iframe
            width="1136"
            height="639"
            src="https://www.youtube.com/embed/1-xGerv5FOk?enablejsapi=1"
            title="Alan Walker - Alone"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen
            class="video"
        ></iframe>
        <iframe
            width="1136"
            height="639"
            src="https://www.youtube.com/embed/3nQNiWdeH2Q?enablejsapi=1"
            title="Janji - Heroes Tonight (feat. Johnning) | NCS"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen
            class="video"
        ></iframe>
    </div>

    <div class="bottom-line"></div>

    <script src="/notification.js"></script>
    <script src="/app.js"></script>
    <script src="/theme.js"></script>
    <script src="/account.js"></script>
</body>
</html>
